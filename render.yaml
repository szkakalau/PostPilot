services:
  - type: web
    name: postpilot-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install && pnpm migrate && pnpm --filter @postpilot/api build
    startCommand: corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm --filter @postpilot/api start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0

  - type: worker
    name: postpilot-worker
    runtime: node
    plan: starter
    rootDir: apps/worker
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
